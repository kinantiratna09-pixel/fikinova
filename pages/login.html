
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Quiz Kesiapan Kerja</title>
    <link rel="icon" type="image/png" href="../img/logo.png">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/login.css">  
</head>
<body>
    <div class="login-shell">
        <div class="login-left">
            <div class="login-panel">
                <div class="login-header">
                    <h1>Login Peserta</h1>
                    <p>Masuk untuk mulai ikut quiz dan pantau skor kesiapan kerja.</p>
                </div>

                <form class="login-form" onsubmit="event.preventDefault(); alert('Login dummy: sistem akan segera terhubung');">
                <label>
                    Email
                    <input type="email" placeholder="masukkan email kamu" required>
                </label>
                <label>
                    Password
                    <input type="password" placeholder="password" required>
                </label>
                <button type="submit" class="button button-primary">Masuk</button>
                </form>

                <p class="login-note">Belum punya akun? <a href="signup.html">Daftar di sini</a>.</p>
            </div>
        </div>
        <div class="login-right">
            <img src="../img/login.png" alt="Maskot" class="maskot-image">
        </div>
    </div>
    <script src="../js/auth.js"></script>
</body>
</html>
