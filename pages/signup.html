
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - Quiz Kesiapan Kerja</title>
    <link rel="icon" type="image/png" href="../img/logo.png">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/signup.css">
</head>
<body>
    <div class="signup-shell">
        <div class="signup-left">
            <div class="signup-panel">
                <div class="signup-header">
                    <h1>Daftar Peserta</h1>
                    <p>Buat akun untuk bergabung dan mulai belajar kesiapan kerja.</p>
                </div>

                <form class="signup-form" onsubmit="event.preventDefault(); alert('Signup dummy: sistem akan segera terhubung');">
                <label>
                    Nama Lengkap
                    <input type="text" placeholder="masukkan nama lengkap kamu" required>
                </label>
                <label>
                    Email
                    <input type="email" placeholder="masukkan email kamu" required>
                </label>
                <label>
                    Password
                    <input type="password" placeholder="password" required>
                </label>
                <label>
                    Konfirmasi Password
                    <input type="password" placeholder="konfirmasi password" required>
                </label>
                <label>
                    <input type="checkbox" required> Setuju dengan Syarat dan Ketentuan
                </label>
                <button type="submit" class="button button-primary">Daftar</button>
                </form>

                <p class="signup-note">Sudah punya akun? <a href="login.html">Login di sini</a>.</p>
            </div>
        </div>
        <div class="signup-right">
            <img src="../img/login.png" alt="Maskot" class="maskot-image">
        </div>
    </div>
    <script src="../js/signup.js"></script>
</body>
</html>
